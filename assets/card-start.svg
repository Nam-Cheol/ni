<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Start path</title>
  <desc id="desc">Initialize a planning workspace, check readiness, lock intent, and compile a prompt.</desc>
  <defs>
    <linearGradient id="card-bg-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DCEBFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="520" height="320" rx="20" fill="url(#card-bg-1)"/>
  <rect x="28" y="28" width="464" height="264" rx="16" fill="#FFFFFF" stroke="#D8E1EE"/>
  <g transform="translate(54 56)" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Helvetica, Arial, sans-serif">
    <circle cx="24" cy="24" r="24" fill="#4FBF9F"/>
    <path d="M15 24 H33 M26 15 L35 24 L26 33" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="32" fill="#111827" font-size="28" font-weight="800">Start</text>
    <g transform="translate(0 82)" font-size="17" font-weight="700">
      <g transform="translate(0 0)">
        <circle cx="10" cy="10" r="6" fill="#4FBF9F"/>
        <path d="M28 10 H396" stroke="#D8E1EE" stroke-width="2" stroke-linecap="round"/>
        <text x="28" y="16" fill="#475569">init workspace</text>
      </g>
      <g transform="translate(0 42)">
        <circle cx="10" cy="10" r="6" fill="#4FBF9F"/>
        <path d="M28 10 H396" stroke="#D8E1EE" stroke-width="2" stroke-linecap="round"/>
        <text x="28" y="16" fill="#475569">status gate</text>
      </g>
      <g transform="translate(0 84)">
        <circle cx="10" cy="10" r="6" fill="#4FBF9F"/>
        <path d="M28 10 H396" stroke="#D8E1EE" stroke-width="2" stroke-linecap="round"/>
        <text x="28" y="16" fill="#475569">end lock</text>
      </g>
      <g transform="translate(0 126)">
        <circle cx="10" cy="10" r="6" fill="#4FBF9F"/>
        <path d="M28 10 H396" stroke="#D8E1EE" stroke-width="2" stroke-linecap="round"/>
        <text x="28" y="16" fill="#475569">run prompt</text>
      </g>
    </g>
    <rect x="0" y="190" width="214" height="36" rx="10" fill="#DCEBFF" stroke="#D8E1EE"/>
    <text x="18" y="214" fill="#111827" font-size="15" font-weight="700">prompt compilation only</text>
  </g>
</svg>

