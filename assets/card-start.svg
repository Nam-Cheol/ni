<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Start path</title>
  <desc id="desc">Initialize, check readiness, lock intent, and compile a prompt.</desc>
  <rect width="520" height="320" rx="20" fill="#fbfaf6"/>
  <rect x="28" y="28" width="464" height="264" rx="18" fill="#ffffff" stroke="#e6dfd1"/>
  <circle cx="72" cy="72" r="24" fill="#70d6c7"/>
  <path d="M62 73 H82 M74 63 L84 73 L74 83" fill="none" stroke="#243044" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="79" fill="#243044" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="800">Start</text>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">
    <rect x="54" y="122" width="116" height="40" rx="20" fill="#e8f0eb"/>
    <text x="82" y="148" fill="#243044">init</text>
    <path d="M178 142 H220" stroke="#8aa096" stroke-width="3" stroke-linecap="round"/>
    <rect x="228" y="122" width="116" height="40" rx="20" fill="#fff2d8"/>
    <text x="257" y="148" fill="#243044">status</text>
    <path d="M170 218 H220" stroke="#8aa096" stroke-width="3" stroke-linecap="round"/>
    <rect x="54" y="198" width="116" height="40" rx="20" fill="#25334a"/>
    <text x="88" y="224" fill="#ffffff">end</text>
    <rect x="228" y="198" width="116" height="40" rx="20" fill="#edf1ff"/>
    <text x="262" y="224" fill="#243044">run</text>
  </g>
  <text x="54" y="272" fill="#385064" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">prompt compilation only</text>
</svg>
