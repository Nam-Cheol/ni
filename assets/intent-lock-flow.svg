      <text x="47" y="132" fill="#25334A" font-size="17" font-weight="800">contract</text>
    </g>
    <g transform="translate(508 62)">
      <rect width="170" height="140" rx="18" fill="#FFFFFF" stroke="#D8E1EE"/>
      <path d="M42 92 L82 38 L122 92 Z" fill="#ECFDF5" stroke="#4FBF9F" stroke-width="5" stroke-linejoin="round"/>
