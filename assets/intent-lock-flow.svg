      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="flow-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="0.55" stop-color="#8B7CF6"/>
      <stop offset="1" stop-color="#4FBF9F"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#25334A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="260" rx="26" fill="url(#flow-bg)"/>
  <g fill="none" stroke="#D8E1EE" stroke-width="1" opacity="0.55">
