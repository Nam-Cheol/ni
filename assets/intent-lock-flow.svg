  <path d="M936 132 L914 119 M936 132 L914 145" stroke="#4FBF9F" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Helvetica, Arial, sans-serif" filter="url(#soft-shadow)">
    <g transform="translate(68 62)">
      <rect width="170" height="140" rx="18" fill="#FFFFFF" stroke="#D8E1EE"/>
      <circle cx="44" cy="46" r="18" fill="#DCEBFF"/>
      <circle cx="84" cy="46" r="18" fill="#EDE9FE"/>
