<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="260" viewBox="0 0 1120 260" role="img" aria-labelledby="title desc">
  <title id="title">Intent Lock Protocol flow</title>
  <desc id="desc">Conversation becomes a project contract, passes a readiness gate, locks by hash, and compiles into a bounded handoff prompt.</desc>
  <defs>
