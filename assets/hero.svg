<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">ni hero</title>
  <desc id="desc">Don't run the agent yet. Compile the intent first. Turn planning conversations into locked project contracts before AI agents or teams start work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#15243a"/>
      <stop offset="0.55" stop-color="#223047"/>
      <stop offset="1" stop-color="#2d5a52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#f4b860"/>
      <stop offset="1" stop-color="#70d6c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#07111f" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <path d="M70 355 C210 245 290 410 435 285 S690 240 790 150 S1025 45 1130 135" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="28" stroke-linecap="round"/>
  <path d="M75 360 C215 250 295 415 440 290 S695 245 795 155 S1030 50 1135 140" fill="none" stroke="url(#accent)" stroke-opacity="0.95" stroke-width="6" stroke-linecap="round"/>

  <g transform="translate(82 78)">
    <rect x="0" y="0" width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.12"/>
    <text x="24" y="27" fill="#e9f4f0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">ni-kernel</text>
    <text x="0" y="112" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="800">Don't run the agent yet.</text>
    <text x="0" y="176" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="800">Compile the intent first.</text>
    <text x="0" y="232" fill="#d9e7e2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">Turn planning conversations into locked project contracts</text>
    <text x="0" y="266" fill="#d9e7e2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">before AI agents or teams start work.</text>
  </g>

  <g transform="translate(680 102)" filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="0" y="0" width="392" height="246" rx="24" fill="#f7fbf8"/>
    <rect x="32" y="34" width="116" height="42" rx="21" fill="#e8f0eb"/>
    <text x="54" y="61" fill="#243044" font-size="16" font-weight="700">conversation</text>
    <path d="M158 55 H214" stroke="#8aa096" stroke-width="3" stroke-linecap="round"/>
    <path d="M204 46 L216 55 L204 64" fill="none" stroke="#8aa096" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="226" y="34" width="118" height="42" rx="21" fill="#fff2d8"/>
    <text x="253" y="61" fill="#243044" font-size="16" font-weight="700">contract</text>

    <rect x="48" y="112" width="92" height="42" rx="21" fill="#dff5ef"/>
    <text x="73" y="139" fill="#243044" font-size="16" font-weight="700">status</text>
    <path d="M150 133 H214" stroke="#8aa096" stroke-width="3" stroke-linecap="round"/>
    <path d="M204 124 L216 133 L204 142" fill="none" stroke="#8aa096" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="226" y="112" width="86" height="42" rx="21" fill="#25334a"/>
    <text x="252" y="139" fill="#ffffff" font-size="16" font-weight="700">lock</text>

