    <path d="M198 175 L186 184 L198 193" fill="none" stroke="#8aa096" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="64" y="184" width="124" height="42" rx="21" fill="#edf1ff"/>
    <text x="86" y="211" fill="#243044" font-size="16" font-weight="700">compile prompt</text>
    <circle cx="332" cy="197" r="18" fill="#70d6c7"/>
    <path d="M324 197 L330 203 L342 189" fill="none" stroke="#142236" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
