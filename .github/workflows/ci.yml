name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.22.x"
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Run quality checks
        run: bash scripts/quality.sh

      - name: Run smoke tests
        run: bash scripts/smoke.sh
