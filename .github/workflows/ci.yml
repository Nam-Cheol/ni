name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Go version
        run: go version

      - name: Run Go tests
        run: go test ./...

      - name: Run quality checks
        run: bash scripts/quality.sh

      - name: Run smoke tests
        run: bash scripts/smoke.sh
